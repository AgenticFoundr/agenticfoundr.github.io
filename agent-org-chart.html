<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgenticFoundr — Enterprise Agent Org Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
 --bg: #060912;
 --surface: #0c1020;
 --surface2: #101828;
 --border: rgba(255,255,255,0.07);
 --text: #e8eaf2;
 --muted: rgba(255,255,255,0.38);
 --primary: #0A351D;
 --primary-light: #165436;
 --gold: #C9A84C;
 --gold-light: #D4BC6A;
 --blue: #3b9eff;
 --cyan: #00dfc8;
 --red: #ff4d6a;
 --purple: #a855f7;
 --green: #22d67a;
 --orange: #ff8c42;
 --sage: #7DA88A;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Syne',sans-serif;overflow:hidden;color:var(--text)}

/* ─── HEADER ─── */
#hdr {
position:fixed;top:0;left:0;right:0;z-index:200;
height:52px;
background:rgba(10,53,29,0.97);
border-bottom:1px solid var(--border);
backdrop-filter:blur(16px);
display:flex;align-items:center;padding:0 20px;gap:12px;
}
.hdr-logo {
font-family:'Syne',sans-serif;font-weight:800;font-size:14px;
letter-spacing:-0.3px;color:var(--gold);white-space:nowrap;
}
.hdr-logo span{color:#FAF8F5}
.hdr-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.hdr-tag {
font-family:'IBM Plex Mono',monospace;font-size:8px;
letter-spacing:2px;text-transform:uppercase;
padding:3px 10px;border-radius:3px;white-space:nowrap;
}
.hdr-tag-grey{color:var(--muted);border:1px solid rgba(255,255,255,0.08)}
.hdr-tag-gold{color:var(--gold);background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2)}
.hdr-tag-green{color:var(--sage);background:rgba(125,168,138,0.08);border:1px solid rgba(125,168,138,0.22)}
.hdr-spacer{flex:1}
.hdr-btns{display:flex;gap:7px}
.hdr-btn {
font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
color:var(--muted);border-radius:20px;padding:5px 14px;
cursor:pointer;transition:all .15s;white-space:nowrap;
}
.hdr-btn:hover{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.3);color:var(--gold)}
.hdr-btn.active{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.4);color:var(--gold)}

/* ─── MODULE DOCK PANEL ─── */
#dock {
position:fixed;right:0;top:52px;bottom:0;width:280px;
background:rgba(10,53,29,0.97);
border-left:1px solid var(--border);
backdrop-filter:blur(16px);
z-index:150;
transform:translateX(100%);
transition:transform .28s cubic-bezier(.16,1,.3,1);
display:flex;flex-direction:column;overflow:hidden;
}
#dock.open{transform:translateX(0)}

.dock-header {
padding:20px 20px 14px;
border-bottom:1px solid var(--border);
flex-shrink:0;
}
.dock-title {
font-family:'IBM Plex Mono',monospace;font-size:9px;
letter-spacing:3px;text-transform:uppercase;color:var(--gold);
margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.dock-title::before{content:'';display:block;width:20px;height:1px;background:var(--gold)}
.dock-sub {
font-size:11px;color:var(--muted);line-height:1.5;
}

.dock-scroll{overflow-y:auto;flex:1;padding:14px 16px 24px}
.dock-scroll::-webkit-scrollbar{width:3px}
.dock-scroll::-webkit-scrollbar-track{background:transparent}
.dock-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.mod-card {
border:1px solid rgba(255,255,255,0.07);border-radius:6px;
padding:14px 14px 12px;margin-bottom:10px;
cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
background:var(--surface);
}
.mod-card::before {
content:'';position:absolute;top:0;left:0;right:0;height:2px;
background:var(--gold);opacity:0.8;
}
.mod-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.mod-card.active{border-color:var(--gold);background:var(--surface2)}

.mod-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.mod-icon{font-size:20px;margin-right:10px;flex-shrink:0}
.mod-info{flex:1}
.mod-name {
font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
letter-spacing:-0.2px;margin-bottom:2px;
}
.mod-industry {
font-family:'IBM Plex Mono',monospace;font-size:7.5px;
letter-spacing:1px;text-transform:uppercase;
color:var(--muted);
}
.mod-toggle {
width:32px;height:18px;border-radius:9px;flex-shrink:0;
background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);
cursor:pointer;position:relative;transition:background .2s;
}
.mod-toggle::after {
content:'';position:absolute;top:2px;left:2px;
width:12px;height:12px;border-radius:50%;
background:rgba(255,255,255,0.4);transition:transform .2s, background .2s;
}
.mod-toggle.on{background:var(--gold);border-color:transparent}
.mod-toggle.on::after{transform:translateX(14px);background:#0A351D}

.mod-agents {
display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;
}
.mod-chip {
font-family:'IBM Plex Mono',monospace;font-size:7px;
letter-spacing:0.3px;padding:2px 7px;border-radius:2px;
background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);
color:var(--gold);
}
.mod-desc{font-size:10px;color:var(--muted);line-height:1.5}

/* ─── CANVAS ─── */
#canvas{
position:fixed;inset:52px 0 0 0;
width:100%;height:calc(100% - 52px);
cursor:grab;user-select:none;
}
#canvas:active{cursor:grabbing}

/* ─── TOOLTIP ─── */
#tip {
position:fixed;background:rgba(10,53,29,0.99);
border:1px solid rgba(201,168,76,0.2);border-radius:10px;
padding:18px 22px;max-width:360px;
pointer-events:none;display:none;z-index:300;
box-shadow:0 28px 72px rgba(0,0,0,0.8);
}
.tip-tier {
font-family:'IBM Plex Mono',monospace;font-size:7.5px;
letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;
color:var(--gold);
}
.tip-name{font-weight:800;font-size:18px;color:#FAF8F5;margin-bottom:2px;letter-spacing:-0.3px}
.tip-role {
font-family:'IBM Plex Mono',monospace;font-size:8.5px;
letter-spacing:1px;text-transform:uppercase;
color:var(--sage);margin-bottom:12px;
}
.tip-mandate {
font-size:11px;font-weight:600;line-height:1.6;
padding:10px 12px;border-radius:4px;margin-bottom:10px;
border-left:3px solid var(--gold);
background:rgba(201,168,76,0.05);
}
.tip-desc{font-size:11px;color:rgba(250,248,245,0.7);line-height:1.7}
.tip-sec {
font-family:'IBM Plex Mono',monospace;font-size:7px;
letter-spacing:2.5px;text-transform:uppercase;
color:rgba(250,248,245,0.3);margin:12px 0 6px;
}
.tip-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.tip-list li {
font-size:10.5px;color:rgba(250,248,245,0.6);
padding-left:14px;position:relative;line-height:1.55;
}
.tip-list li::before{content:'›';position:absolute;left:0;opacity:.4}
.tip-chips{display:flex;flex-wrap:wrap;gap:4px}
.tip-chip {
font-family:'IBM Plex Mono',monospace;font-size:7.5px;
padding:2px 7px;border-radius:2px;
color:var(--gold);border:1px solid rgba(201,168,76,0.2);
background:rgba(201,168,76,0.05);
}

/* ─── LEGEND ─── */
#legend {
position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
background:rgba(10,53,29,0.93);border:1px solid var(--border);
border-radius:24px;padding:7px 18px;backdrop-filter:blur(14px);
display:flex;gap:12px;align-items:center;z-index:100;
flex-wrap:wrap;justify-content:center;
max-width:90vw;
}
.leg{display:flex;align-items:center;gap:5px;white-space:nowrap}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.leg-lbl{font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:0.5px;color:rgba(250,248,245,0.5)}
.leg-sep{width:1px;height:12px;background:rgba(255,255,255,0.08)}
.leg-module{border:1px dashed rgba(255,255,255,0.25);border-radius:2px}
</style>
</head>

</svg>

<div id="tip"></div>

<!-- LEGEND -->

let scale = 1, panX = 0, panY = 0, isDragging = false, startX, startY;
const canvas = document.getElementById('canvas'), root = document.getElementById('root'), tip = document.getElementById('tip');

const TIERS = {
 owner: {y:0, label:'FOUNDER'},
 0: {y:1, label:'TIER 0 — CEO'},
 1: {y:2, label:'TIER 1 — C-SUITE'},
 2: {y:3, label:'TIER 2 — VP'},
 3: {y:4, label:'TIER 3 — DIRECTOR'},
 dlane: {y:3.5, label:'DATA LANE'},
 slane: {y:3.5, label:'SECURITY LANE'}
};

const TIER_COLORS = {
 owner: '#C9A84C',
 0: '#C9A84C',
 1: '#0A351D',
 2: '#7DA88A',
 3: '#165436',
 dlane: '#00dfc8',
 slane: '#C9A84C'
};

function pos(tier, index, total) {
 const y = TIERS[tier]?.y ?? 3;
 const x = (index - (total-1)/2) * 140;
 return {x: x*scale + 400 + panX, y: y*120*scale + 120 + panY};
}

function drawNode(id, data, x, y, parentId) {
 const g = document.createElementNS('http://www.w3.org/2000/svg','g');
 g.setAttribute('transform', `translate(${x},${y})`);
 g.style.cursor = 'pointer';
 g.dataset.id = id;
 
 const boxW = 120, boxH = data.tier === 0 ? 60 : 50;
 const color = data.c || '#0A351D';
 
 // Glow for CEO
 if(data.tier === 0) {
  const glow = document.createElementNS('http://www.w3.org/2000/svg','rect');
  glow.setAttribute('x', -boxW/2 - 4);
  glow.setAttribute('y', -boxH/2 - 4);
  glow.setAttribute('width', boxW + 8);
  glow.setAttribute('height', boxH + 8);
  glow.setAttribute('rx', 8);
  glow.setAttribute('fill', color);
  glow.setAttribute('filter', 'url(#glow)');
  g.appendChild(glow);
 }
 
 // Card bg
 const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
 rect.setAttribute('x', -boxW/2);
 rect.setAttribute('y', -boxH/2);
 rect.setAttribute('width', boxW);
 rect.setAttribute('height', boxH);
 rect.setAttribute('rx', 6);
 rect.setAttribute('fill', '#0c1020');
 rect.setAttribute('stroke', color);
 rect.setAttribute('stroke-width', data.tier === 0 ? 2 : 1.5);
 rect.setAttribute('filter', 'url(#drop)');
 g.appendChild(rect);
 
 // Emoji
 const emoji = document.createElementNS('http://www.w3.org/2000/svg','text');
 emoji.setAttribute('x', -boxW/2 + 12);
 emoji.setAttribute('y', 5);
 emoji.setAttribute('font-size', data.tier === 0 ? 24 : 18);
 emoji.textContent = data.e || '●';
 g.appendChild(emoji);
 
 // Name
 const name = document.createElementNS('http://www.w3.org/2000/svg','text');
 name.setAttribute('x', -boxW/2 + 36);
 name.setAttribute('y', data.tier === 0 ? -8 : -6);
 name.setAttribute('font-size', data.tier === 0 ? 13 : 11);
 name.setAttribute('font-weight', '700');
 name.setAttribute('fill', '#FAF8F5');
 name.textContent = data.n;
 g.appendChild(name);
 
 // Role
 const role = document.createElementNS('http://www.w3.org/2000/svg','text');
 role.setAttribute('x', -boxW/2 + 36);
 role.setAttribute('y', data.tier === 0 ? 8 : 10);
 role.setAttribute('font-size', 8);
 role.setAttribute('fill', color);
 role.textContent = data.r.substring(0, 20);
 g.appendChild(role);
 
 // Connection line
 if(parentId) {
  const parent = CORE[parentId];
  const pp = TIERS[parent.tier]?.y ?? 3;
  const cp = TIERS[data.tier]?.y ?? 3;
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', x);
  line.setAttribute('y1', y - boxH/2);
  line.setAttribute('x2', x);
  line.setAttribute('y2', y - boxH/2 - 20*scale);
  line.setAttribute('stroke', 'rgba(255,255,255,0.1)');
  line.setAttribute('stroke-width', 1);
  root.insertBefore(line, g);
 }
 
 g.addEventListener('mouseenter', e => showTip(e, id, data));
 g.addEventListener('mouseleave', hideTip);
 g.addEventListener('mousemove', e => moveTip(e));
 
 root.appendChild(g);
}

function showTip(e, id, data) {
 const t = data.tier === 0 ? 'TIER 0 — CEO' : data.tier === 1 ? 'TIER 1 — C-SUITE' : data.tier === 2 ? 'TIER 2 — VP' : data.tier === 3 ? 'TIER 3 — DIRECTOR' : data.tier === 'dlane' ? 'DATA LANE' : data.tier === 'slane' ? 'SECURITY LANE' : 'FOUNDER';
 let html = `<div class="tip-tier">${t}</div>
 <div class="tip-name">${data.n}</div>
 <div class="tip-role">${data.r}</div>`;
 
 if(data.mandate) {
  html += `<div class="tip-mandate">${data.mandate}</div>`;
 }
 
 if(data.desc) {
  html += `<div class="tip-desc">${data.desc}</div>`;
 }
 
 if(data.resp && data.resp.length) {
  html += `<div class="tip-sec">Responsibilities</div><ul class="tip-list">`;
  data.resp.slice(0,5).forEach(r => html += `<li>${r}</li>`);
  html += `</ul>`;
 }
 
 if(data.tools && data.tools.length) {
  html += `<div class="tip-sec">Tools</div><div class="tip-chips">`;
  data.tools.slice(0,6).forEach(t => html += `<span class="tip-chip">${t}</span>`);
  html += `</div>`;
 }
 
 tip.innerHTML = html;
 tip.style.display = 'block';
 moveTip(e);
}

function moveTip(e) {
 const x = e.clientX + 20, y = e.clientY + 20;
 tip.style.left = Math.min(x, window.innerWidth - 380) + 'px';
 tip.style.top = Math.min(y, window.innerHeight - 400) + 'px';
}

function hideTip() { tip.style.display = 'none'; }

function resetView() { scale = 1; panX = 0; panY = 0; render(); }
function zoomIn() { scale = Math.min(scale * 1.2, 3); render(); }
function zoomOut() { scale = Math.max(scale / 1.2, 0.3); render(); }

// Canvas drag
canvas.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; canvas.style.cursor = 'grabbing'; });
canvas.addEventListener('mousemove', e => { if(!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; render(); });
canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Touch support
canvas.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; });
canvas.addEventListener('touchmove', e => { if(!isDragging) return; panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; render(); });
canvas.addEventListener('touchend', () => isDragging = false);

// Mouse wheel zoom
canvas.addEventListener('wheel', e => {
 e.preventDefault();
 scale = e.deltaY > 0 ? Math.max(scale / 1.1, 0.3) : Math.min(scale * 1.1, 3);
 render();
}, {passive: false});

function render() {
 root.innerHTML = '';
 
 // Owner
 const ownerPos = pos('owner', 0, 1);
 drawNode('HUMAN', CORE.HUMAN, ownerPos.x, ownerPos.y, null);
 
 // CEO
 const ceoPos = pos(0, 0, 1);
 drawNode('ATLAS', CORE.ATLAS, ceoPos.x, ceoPos.y, 'HUMAN');
 
 // C-Suite (9 agents)
 const csuite = ['STEWARD','BRIDGE','VOICE','HARVEST','CRAFT','HAVEN','SAGE','KEEPER','SHIELD'];
 csuite.forEach((id, i) => {
  const p = pos(1, i, csuite.length);
  drawNode(id, CORE[id], p.x, p.y, 'ATLAS');
 });
 
 // VP Layer (17 agents)
 const vps = ['COMPASS','LEDGER','DELIVER','INSIGHT','GROW','SCOUT','QUILL','FOUNDATION','BUILDER','WARMTH','GUIDE','JUSTICE','CHARTER','TRUST','FLOW','VIGIL','ACCORD'];
 vps.forEach((id, i) => {
  const p = pos(2, i, vps.length);
  drawNode(id, CORE[id], p.x, p.y, id === 'COMPASS' || id === 'LEDGER' ? 'STEWARD' : id === 'DELIVER' || id === 'INSIGHT' || id === 'GUIDE' ? 'BRIDGE' : id === 'QUILL' || id === 'SCOUT' ? 'VOICE' : id === 'GROW' || id === 'COMPASS' ? 'HARVEST' : id === 'FOUNDATION' || id === 'BUILDER' ? 'CRAFT' : id === 'WARMTH' || id === 'GUIDE' ? 'HAVEN' : id === 'JUSTICE' || id === 'CHARTER' ? 'SAGE' : id === 'TRUST' || id === 'FLOW' ? 'KEEPER' : 'SHIELD');
 });
 
 // Directors (10)
 const dirs = ['SEEK','RHYTHM','COVENANT','INK','THREAD','EMBER','TALLY','POLISH','BOND','LENS'];
 dirs.forEach((id, i) => {
  const p = pos(3, i, dirs.length);
  drawNode(id, CORE[id], p.x, p.y, 'VOICE');
 });
 
 // Data Lane (3)
 const dlane = ['GUARDIAN_D','CURATOR','RIVER'];
 dlane.forEach((id, i) => {
  const p = pos('dlane', i, dlane.length);
  const realId = id === 'GUARDIAN_D' ? 'GUARDIAN-D' : id;
  drawNode(realId, CORE[id], p.x - 200, p.y + 80, 'KEEPER');
 });
 
 // Security Lane (16)
 const slane = ['WATCH','RESOLVE','GATE','VAULT','INTAKE','MASK','VISION','PURE','ISOLATE','SENTINEL','FILTER','TREASURY','VERIFY','CHRONICLE','ZERO','CONTAIN'];
 slane.forEach((id, i) => {
  const p = pos('slane', i, slane.length);
  drawNode(id, CORE[id], p.x + 200, p.y + 80, 'SHIELD');
 });
}

// Dock
function toggleDock() {
 document.getElementById('dock').classList.toggle('open');
 document.getElementById('dockBtn').classList.toggle('active');
}

MODULES.forEach(m => {
 const card = document.createElement('div');
 card.className = 'mod-card';
 card.innerHTML = `
  <div class="mod-top">
   <div class="mod-icon">${m.icon}</div>
   <div class="mod-info">
    <div class="mod-name">${m.name}</div>
    <div class="mod-industry">${m.industry}</div>
   </div>
   <div class="mod-toggle" onclick="this.classList.toggle('on');event.stopPropagation()"></div>
  </div>
  <div class="mod-agents">${m.agents.slice(0,4).map(a => `<span class="mod-chip">${a.id}</span>`).join('')}</div>
  <div class="mod-desc">${m.desc}</div>
 `;
 document.getElementById('dockScroll').appendChild(card);
});

// Init
render();
</script>

</body>
</html>
